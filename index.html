<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Planet Dan Waspada - Adiatma</title>
    <style>
        :root { 
            --bg-color: #000; 
            --card-bg: rgba(0, 0, 0, 0.2); /* Dipertajam agar background jelas */
            --text-color: #ffffff;
            --accent: #3498db; 
            --red-dot: #e74c3c;
            --green-dot: #2ecc71;
            --panel-bg: #1a1a1a;
        }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: var(--text-color); 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0;
            transition: background 0.5s ease;
        }

        .container { 
            max-width: 480px; 
            width: 100%; 
            background: var(--card-bg); 
            padding: 20px; 
            position: relative; 
            backdrop-filter: blur(2px); /* Blur rendah agar background jelas */
            -webkit-backdrop-filter: blur(2px);
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .status-dot { position: absolute; top: 20px; right: 20px; width: 12px; height: 12px; background-color: var(--red-dot); border-radius: 50%; transition: 0.3s; z-index: 10;}
        .dot-active { background-color: var(--green-dot); box-shadow: 0 0 12px var(--green-dot); }

        .main-title { text-align: center; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: var(--accent); text-shadow: 2px 2px 4px #000; letter-spacing: 1px; }

        .status-zuhal { background: rgba(231, 76, 60, 0.85) !important; color: white !important; animation: pulse 2s infinite; }
        .status-musytari { background: rgba(46, 204, 113, 0.85) !important; color: white !important; animation: pulse 2s infinite; }
        .status-marikh { background: rgba(241, 196, 15, 0.95) !important; color: #000 !important; animation: pulse 2s infinite; }
        .status-blue { background: rgba(52, 152, 219, 0.85) !important; color: white !important; animation: pulse 2s infinite; }

        /* PANEL KONFIGURASI DI ATAS */
        #settingPanel { 
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%; 
            box-sizing: border-box;
            background: var(--panel-bg); 
            padding: 20px; 
            border-bottom-left-radius: 25px; 
            border-bottom-right-radius: 25px;
            z-index: 100; 
            border-bottom: 2px solid var(--accent); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .config-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .config-header h3 { margin: 0; font-size: 1rem; }

        .upload-section { 
            margin-bottom: 12px; 
            padding: 12px; 
            border: 1px dashed #444; 
            border-radius: 12px; 
            background: rgba(255,255,255,0.03); 
        }
        
        .upload-section label { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; margin-bottom: 8px; color: var(--accent); font-weight: bold; }
        
        .audio-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .audio-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; color: #bbb; }
        .audio-item input { width: 60%; font-size: 0.7rem; }

        input[type="time"] { 
            width: 100%; padding: 10px; border-radius: 8px; background: #222; 
            color: white; border: 1px solid #444; font-size: 1rem; margin-top: 5px;
        }

        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
        .btn-test { 
            padding: 10px; font-size: 0.75rem; cursor: pointer; background: #2a2a2a; 
            color: white; border: 1px solid #444; border-radius: 8px; transition: 0.2s;
        }
        .btn-test:active { background: var(--accent); }

        .btn-save { 
            width: 100%; padding: 12px; background: var(--accent); color: white; 
            border: none; border-radius: 10px; font-weight: bold; font-size: 0.9rem; 
            cursor: pointer; box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .branding { cursor: pointer; padding: 10px; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        .time-box { background: rgba(0,0,0,0.4); color: #fff; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 12px; font-size: 2.5rem; font-family: monospace; border: 1px solid rgba(255,255,255,0.1); text-shadow: 0 0 10px var(--accent); }
        #statusBox { padding: 15px; text-align: center; font-weight: bold; border-radius: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.58rem; margin-top: 5px; }
        td { padding: 6px 1px; text-align: center; border: 1px solid rgba(255,255,255,0.08); color: #fff; }
        th { padding: 5px; color: var(--accent); background: rgba(0,0,0,0.5); font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="dotIndicator" class="status-dot"></div>
    
    <div id="settingPanel">
        <div class="config-header"><span>⚙️</span><h3>Konfigurasi Sistem</h3></div>
        
        <div class="upload-section">
            <label>🖼️ Ganti Background:</label>
            <input type="file" accept="image/*" onchange="uploadBackground(this)" style="width:100%; font-size:0.75rem;">
            <button onclick="removeBackground()" class="btn-test" style="width:100%; margin-top:8px;">Hapus Background</button>
        </div>

        <div class="upload-section">
            <label>🔊 Upload Suara:</label>
            <div class="audio-grid">
                <div class="audio-item"><span>Zuhal:</span><input type="file" onchange="uploadAudio('zuhal', this)"></div>
                <div class="audio-item"><span>Musy:</span><input type="file" onchange="uploadAudio('musytari', this)"></div>
                <div class="audio-item"><span>Marikh:</span><input type="file" onchange="uploadAudio('marikh', this)"></div>
                <div class="audio-item"><span>Lainnya:</span><input type="file" onchange="uploadAudio('other', this)"></div>
            </div>
        </div>

        <div class="upload-section">
            <label>⏰ Jam Terbit:</label>
            <input type="time" id="setJamAwal">
        </div>

        <div class="grid-buttons">
            <button class="btn-test" onclick="testSound('zuhal')">Tes Zuhal</button>
            <button class="btn-test" onclick="testSound('musytari')">Tes Musy</button>
            <button class="btn-test" onclick="testSound('marikh')">Tes Marikh</button>
            <button class="btn-test" onclick="testSound('other')">Tes Lainnya</button>
        </div>

        <button onclick="saveSettings()" class="btn-save">SIMPAN & AKTIFKAN</button>
    </div>

    <div class="main-title">JAM PLANET DAN WASPADA</div>
    <div class="branding" onclick="document.getElementById('settingPanel').style.display='block'">BY ADIATMA</div>
    <div class="time-box" id="digitalClock">00.00.00</div>
    <div id="statusBox">Ketuk layar untuk memulai</div>

    <table>
        <thead><tr><th>JAM</th><th>SEN</th><th>SEL</th><th>RAB</th><th>KAM</th><th>JUM</th><th>SAB</th><th>MIN</th></tr></thead>
        <tbody id="tableContent"></tbody>
    </table>
</div>

<script>
    let config = JSON.parse(localStorage.getItem('adiatmaConfig')) || { jamAwal: "05:30" };
    let customSounds = { zuhal: null, musytari: null, marikh: null, other: null };
    let lastPlanet = "";
    let wakeLock = null;

    // Load Assets
    const savedBg = localStorage.getItem('userBackground');
    if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
    
    ['zuhal', 'musytari', 'marikh', 'other'].forEach(p => {
        const saved = localStorage.getItem('sound_' + p);
        if (saved) customSounds[p] = saved;
    });

    document.getElementById('setJamAwal').value = config.jamAwal;

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('dotIndicator').classList.add('dot-active');
            }
        } catch (err) { console.log(err.message); }
    }

    function uploadBackground(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                localStorage.setItem('userBackground', e.target.result);
            };
            reader.readAsDataURL(file);
        }
    }

    function removeBackground() {
        document.body.style.backgroundImage = "none";
        localStorage.removeItem('userBackground');
    }

    function uploadAudio(planet, input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                customSounds[planet] = e.target.result;
                localStorage.setItem('sound_' + planet, e.target.result);
            };
            reader.readAsDataURL(file);
        }
    }

    function testSound(type) {
        const soundData = customSounds[type] || customSounds['other'];
        if (soundData) { new Audio(soundData).play(); }
    }

    function saveSettings() {
        config.jamAwal = document.getElementById('setJamAwal').value;
        localStorage.setItem('adiatmaConfig', JSON.stringify(config));
        document.getElementById('settingPanel').style.display = 'none';
        refresh();
    }

    const planetsData = [["qomar","marikh","uthorid","musytari","zuhroh","zuhal","syamsun"],["zuhal","syamsun","qomar","marikh","uthorid","musytari","zuhroh"],["musytari","zuhroh","zuhal","syamsun","qomar","marikh","uthorid"],["marikh","uthorid","musytari","zuhroh","zuhal","syamsun","qomar"],["syamsun","qomar","marikh","uthorid","musytari","zuhroh","zuhal"],["zuhroh","zuhal","syamsun","qomar","marikh","uthorid","musytari"],["uthorid","musytari","zuhroh","zuhal","syamsun","qomar","marikh"],["qomar","marikh","uthorid","musytari","zuhroh","zuhal","syamsun"],["zuhal","syamsun","qomar","marikh","uthorid","musytari","zuhroh"],["musytari","zuhroh","zuhal","syamsun","qomar","marikh","uthorid"],["marikh","uthorid","musytari","zuhroh","zuhal","syamsun","qomar"],["syamsun","qomar","marikh","uthorid","musytari","zuhroh","zuhal"],["musytari","zuhroh","zuhal","syamsun","qomar","marikh","uthorid"],["marikh","uthorid","musytari","zuhroh","zuhal","syamsun","qomar"],["syamsun","qomar","marikh","uthorid","musytari","zuhroh","zuhal"],["zuhroh","zuhal","syamsun","qomar","marikh","uthorid","musytari"],["uthorid","musytari","zuhroh","zuhal","syamsun","qomar","marikh"],["qomar","marikh","uthorid","musytari","zuhroh","zuhal","syamsun"],["zuhal","syamsun","qomar","marikh","uthorid","musytari","zuhroh"],["musytari","zuhroh","zuhal","syamsun","qomar","marikh","uthorid"],["marikh","uthorid","musytari","zuhroh","zuhal","syamsun","qomar"],["syamsun","qomar","marikh","uthorid","musytari","zuhroh","zuhal"],["zuhroh","zuhal","syamsun","qomar","marikh","uthorid","musytari"],["uthorid","musytari","zuhroh","zuhal","syamsun","qomar","marikh"]];

    function getStatusClass(p) { return p === "zuhal" ? "status-zuhal" : (p === "musytari" ? "status-musytari" : (p === "marikh" ? "status-marikh" : "status-blue")); }
    function getStatusLabel(p) { return p === "zuhal" ? "(NAHAS BESAR)" : (p === "musytari" ? "(SANGAT BAIK)" : (p === "marikh" ? "(NAHAS KECIL)" : "(BAIK)")); }

    function refresh() {
        const now = new Date();
        const currentTotal = now.getHours() * 60 + now.getMinutes();
        const [startH, startM] = config.jamAwal.split(':').map(Number);
        const startTotalBase = startH * 60 + startM;
        let dIdx = (now.getDay() + ((currentTotal < startTotalBase) ? -1 : 0) + 7) % 7;
        const tableDIdx = dIdx === 0 ? 7 : dIdx;

        document.getElementById('digitalClock').innerText = now.toLocaleTimeString('id-ID').replace(/:/g, ".");
        const tbody = document.getElementById('tableContent');
        tbody.innerHTML = '';
        let currentPlanet = "";

        planetsData.forEach((planets, i) => {
            const rowTotalStart = (startTotalBase + (i * 60)) % 1440;
            const h = Math.floor(rowTotalStart / 60), m = rowTotalStart % 60;
            const tr = document.createElement('tr');
            const tdJam = document.createElement('td');
            tdJam.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            const isNow = (currentTotal >= rowTotalStart && currentTotal < (rowTotalStart + 60));
            
            planets.forEach((p, idx) => {
                const td = document.createElement('td');
                td.innerText = p;
                if (isNow && (idx + 1) === tableDIdx) { 
                    currentPlanet = p.toLowerCase(); 
                    td.className = getStatusClass(currentPlanet); 
                    tdJam.className = getStatusClass(currentPlanet); 
                }
                tr.appendChild(td);
            });
            tr.prepend(tdJam);
            tbody.appendChild(tr);
        });

        if (currentPlanet && currentPlanet !== lastPlanet) {
            if (lastPlanet !== "") {
                const soundToPlay = customSounds[currentPlanet] || customSounds['other'];
                if (soundToPlay) new Audio(soundToPlay).play();
            }
            lastPlanet = currentPlanet;
        }
        
        const sBox = document.getElementById('statusBox');
        if (currentPlanet) {
            sBox.className = getStatusClass(currentPlanet);
            sBox.innerText = `STATUS : ${currentPlanet.toUpperCase()} ${getStatusLabel(currentPlanet)}`;
        }
    }

    document.body.addEventListener('click', () => {
        requestWakeLock();
        refresh();
    });

    setInterval(refresh, 1000);
    refresh();
</script>
</body>
</html>
